          \ access_token\n(nullable)^|Bearer ABCDERAdjflaskjdfosiaetlkfs"
        required: false
        schema:
          type: string
      - name: mallKey
        in: header
        description: " 외부 API 연동키 (외부시스템연동 코드)\n \n ※ server API 호출하는 기존 방식으로, 향후\
          \ fade out될 수 있습니다.<br />\n\n Authorization을 입력을 통한 serverAPI 호출방식 권장드립니\
          다.<br />\n\n (Authorization 입력했을 경우, mallKey는 null로 보내시길 바랍니다.)<br />\n\n\
          \n (nullable)^|각 어드민에서 복사된 값"
        required: false
        schema:
          type: string
        example: QUZjUHlHV0JtdUFrSWVyUmhnRUFTcUt1SzR3ckFRSk0
      - name: version
        in: header
        description: API 버전^|1.0
        required: true
        schema:
          type: string
        example: "1.0"
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/brands-displayBrandNo-94055997'
              examples:
                get-brand-detail:
                  value: "{\"no\":1,\"mainName\":\"NIKE\",\"subName\":\"나이키\",\"depth\"\
                    :1,\"displayAreaContentUrl\":\"image.com/12312312\",\"description\"\
                    :\"스포츠 브랜드\",\"extraInfo\":\"\",\"mainImageContents\":\"\",\"\
                    detailContents\":\"\",\"children\":[]}"
  /custom-properties:
    get:
      tags:
      - Custom Property
      summary: 상품 추가항목 전체 조회하기
      description: "## 부가설명 및 특이사항\n            \n전체 상품 추가항목을 조회하는 API입니다\n"
      operationId: get-custom-property
      parameters:
      - name: systemKey
        in: header
        description: "\n 시스템 키 (외부시스템 연동을 위한 server API 호출 키)\n - 발급경로: 워크스페이스> 셀러\
          어드민> 신규 앱(App) 등록 시 수정페이지에서 확인가능 \n - 앱 기준으로 systemKey 발급됨\n^|test-system-key"
        required: true
        schema:
          type: string
        example: czFERzFSRGZQY3hwZjQxZTNZd2NTZz09
      - name: Authorization
        in: header
        description: "\n \n 인증토큰 (Bearer 전달받은 토큰)\n \n - 형식: Bearer + 발급받은 access_token\n\
          \n - 발급경로: POST /auth/token 또는 POST /auth/token/long-lived 의 응답 값으로 내려온\
          \ access_token\n(nullable)^|Bearer ABCDERAdjflaskjdfosiaetlkfs"
        required: false
        schema:
          type: string
      - name: mallKey
        in: header
        description: " 외부 API 연동키 (외부시스템연동 코드)\n \n ※ server API 호출하는 기존 방식으로, 향후\
          \ fade out될 수 있습니다.<br />\n\n Authorization을 입력을 통한 serverAPI 호출방식 권장드립니\
          다.<br />\n\n (Authorization 입력했을 경우, mallKey는 null로 보내시길 바랍니다.)<br />\n\n\
          \n (nullable)^|각 어드민에서 복사된 값"
        required: false
        schema:
          type: string
        example: QUZjUHlHV0JtdUFrSWVyUmhnRUFTcUt1SzR3ckFRSk0
      - name: version
        in: header
        description: API 버전^|1.0
        required: true
        schema:
          type: string
        example: "1.0"
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/custom-properties-53274064'
              examples:
                get-custom-property:
                  value: "[{\"propertyNo\":1,\"propertyName\":\"시즌\",\"multiSelectionEnabled\"\
                    :false,\"values\":[{\"valueNo\":1,\"valueName\":\"S/S\"},{\"valueNo\"\
                    :2,\"valueName\":\"F/W\"}]}]"
  /custom-properties/{productNo}/mappings:
    post:
      tags:
      - Custom Property
      summary: 상품 추가항목 매핑 추가
      description: 상품에 추가항목 값을 개별 추가합니다. 기존 매핑은 유지하고 신규 매핑만 INSERT합니다.
      operationId: add-custom-properties
      parameters:
      - name: productNo
        in: path
