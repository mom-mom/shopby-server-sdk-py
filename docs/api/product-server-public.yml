  /purchase-permission:
    post:
      tags:
      - Purchase Permission
      summary: 상품우선구매권한 생성하기
      description: "## 부가설명 및 특이사항\n            \n상품 우선구매권한 생성 API 입니다.\n"
      operationId: post-purchase-permission
      parameters:
      - name: systemKey
        in: header
        description: "\n 시스템 키 (외부시스템 연동을 위한 server API 호출 키)\n - 발급경로: 워크스페이스> 셀러\
          어드민> 신규 앱(App) 등록 시 수정페이지에서 확인가능 \n - 앱 기준으로 systemKey 발급됨\n^|test-system-key"
        required: true
        schema:
          type: string
        example: czFERzFSRGZQY3hwZjQxZTNZd2NTZz09
      - name: Authorization
        in: header
        description: "\n \n 인증토큰 (Bearer 전달받은 토큰)\n \n - 형식: Bearer + 발급받은 access_token\n\
          \n - 발급경로: POST /auth/token 또는 POST /auth/token/long-lived 의 응답 값으로 내려온\
          \ access_token\n(nullable)^|Bearer ABCDERAdjflaskjdfosiaetlkfs"
        required: false
        schema:
          type: string
      - name: mallKey
        in: header
        description: " 외부 API 연동키 (외부시스템연동 코드)\n \n ※ server API 호출하는 기존 방식으로, 향후\
          \ fade out될 수 있습니다.<br />\n\n Authorization을 입력을 통한 serverAPI 호출방식 권장드립니\
          다.<br />\n\n (Authorization 입력했을 경우, mallKey는 null로 보내시길 바랍니다.)<br />\n\n\
          \n (nullable)^|각 어드민에서 복사된 값"
        required: false
        schema:
          type: string
        example: QUZjUHlHV0JtdUFrSWVyUmhnRUFTcUt1SzR3ckFRSk0
      - name: version
        in: header
        description: API 버전^|1.0
        required: true
        schema:
          type: string
        example: "1.0"
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/purchase-permission-2025784983'
            examples:
              post-purchase-permission:
                value: "{\"productPermission\":{\"productNo\":11100001,\"optionNo\"\
                  :1000001,\"purchaseStartAt\":\"2026-06-24T09:58:36.67588905\",\"\
                  purchaseEndAt\":\"2026-06-25T09:58:36.675896494\",\"stockChangeable\"\
                  :true},\"memberPermissions\":[{\"memberNo\":1,\"purchaseCnt\":2}]}"
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/purchase-permission380827083'
              examples:
                post-purchase-permission:
                  value: "{\"permissionNo\":1}"
