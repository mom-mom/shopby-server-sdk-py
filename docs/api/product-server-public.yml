      tags:
      - Product
      summary: 재고연동상품 등록하기
      description: "## 부가설명 및 특이사항\n            \n상품 재고연동 생성하는 API입니다\n\n기존 상품의 재고\
        를 연동하여 상품을 새로 생성할 수 있습니다.\n\n## 플랜별 상품 등록 제한\n\n* basic : 50 건\n\n* pro :\
        \ 30,000 건\n\n* enterprise : 무제한\n\n## 상품 안내 정보 (productGuides)\n\n* templateNo\
        \ 를 모르는 경우 type 값만 입력하여 호출 시 해당 파트너에 등록된 상품 안내 정보 템플릿 정보로 저장됩니다.\n\n* 템플릿이\
        \ 아닌 직접 정보를 입력하고 싶은 경우, type, content 를 입력하여 호출합니다.\n\n## [개발중] 단위가격 총량 계산\
        \ (unitPriceInfo)\n\n* `unitPriceInfo` 객체(UnitPriceModel)를 사용합니다. `baseQuantity`,\
        \ `totalQuantity` 필드가 추가되었습니다.\n\n* 두 필드 모두 입력 시, 내부적으로 unitName이 `\"baseQuantity|totalQuantity\"\
        ` 형식으로 자동 변환됩니다.\n\n* 기존 `name` 필드만 사용하는 방식도 그대로 호환됩니다.\n\n* 예시) baseQuantity=1,\
        \ totalQuantity=10, type=\"팩\", price=500 → 1팩당 500원, 총 10팩\n\n* 주의: totalQuantity\
        \ < baseQuantity 인 경우 INVALID_UNIT_BASE_QUANTITY 오류\n"
