      description: "## 부가설명 및 특이사항\n            \n상품의 일부를 수정하는 API입니다\n\n수정을 원하는 일\
        부의 값만 수정합니다.\n\n수정이 필요한 필드의 키와 값만 넣습니다.(nullable 한 필드값에 `null` 값으로 요청하는 경우\
        , `null` 값이 반영됩니다.\n\n객체를 수정하는 경우, 객체 내에 수정할 정보를 제외한 나머지는 기존 정보 그대로 입력해야합니\
        다.\n\n* 예를 들어, `productImages`에서 `imageUrl`만 수정하려면 `mallImageNo`, `order`,\
        \ `mainYn` 등은 기존 정보를 입력합니다.\n\n## 상품 안내 정보 (productGuides)\n\n* templateNo\
        \ 를 모르는 경우 type 값만 입력하여 호출 시 해당 파트너에 등록된 상품 안내 정보 템플릿 정보로 저장됩니다.\n\n* 템플릿이\
        \ 아닌 직접 정보를 입력하고 싶은 경우, type, content 를 입력하여 호출합니다.\n\n## 필수/선택형 옵션\n\n* 해\
        당 옵션을 사용할 경우 optionData.options[].optionType = REQUIRED 의 옵션 타입 요청이 필요합니다\
        .\n\n* 해당 옵션은 최소 1개 이상의 필수옵션이 필요합니다.\n\n* optionData.options[].isRequiredOption의\
        \ Boolean값을 통해 필수/선택 옵션 여부를 설정할 수 있습니다.\n\n* optionName은 `필수옵션` or `선택옵션`으\
        로 고정 되기 때문에 `필수옵션` or `선택옵션`으로 요청해주세요.\n\n## [개발중] 단위가격 총량 계산 (unitName, unitNameType,\
        \ unitPrice)\n\n* v1.0은 `unitName`, `unitNameType`, `unitPrice` 개별 필드를 사용합\
        니다. (`unitPriceInfo` 객체 및 `baseQuantity`/`totalQuantity` 필드 미지원)\n\n* 단위가격\
        \ 총량 계산이 필요한 경우, unitName에 `\"기준단위개수|총단위개수\"` 형식으로 직접 입력합니다.\n\n* 예시) unitName=\"\
        1|10\", unitNameType=\"팩\", unitPrice=500 → 1팩당 500원, 총 10팩\n\n* 기존 방식: unitName=\"\
        10\" → 기준수량 10 (그대로 호환)\n\n* 구조화된 요청이 필요한 경우 Version 2.0 API를 사용하세요. (price.unitPriceInfo에\
        \ unitBaseQuantity/unitTotalQuantity 필드가 제공됩니다)\n"
