openapi: 3.0.1
info:
  title: product-server
  description: ' 상품(product)관련 server API입니다.'
  version: 0.0.1-SNAPSHOT
servers:
- url: https://server-api.e-ncp.com
tags:
- name: Brand
  description: 브랜드
- name: Configuration
  description: 설정
- name: Product
  description: 상품
- name: Custom Property
  description: 상품 추가 항목
- name: Duty Category
  description: 상품 정보 고시
- name: Profile
  description: 프로필 (회원)
- name: Product Guide
  description: 상품 이용 안내
- name: Purchase Permission
  description: 구매 권한
paths:
  /brands:
    get:
      tags:
      - Brand
      summary: 브랜드 전체 조회하기(트리 구조) version 2.0
      description: "## 부가설명 및 특이사항\n            \n브랜드 전체 조회(트리 구조)하는 API입니다\n"
      operationId: get-brands
      parameters:
      - name: version
        in: header
        description: API 버전^|2.0
        required: true
        schema:
          type: string
        example: "2.0"
      - name: systemKey
        in: header
        description: "\n 시스템 키 (외부시스템 연동을 위한 server API 호출 키)\n - 발급경로: 워크스페이스> 셀러\
          어드민> 신규 앱(App) 등록 시 수정페이지에서 확인가능 \n - 앱 기준으로 systemKey 발급됨\n^|test-system-key"
        required: true
        schema:
          type: string
        example: czFERzFSRGZQY3hwZjQxZTNZd2NTZz09
      - name: Authorization
        in: header
        description: "\n \n 인증토큰 (Bearer 전달받은 토큰)\n \n - 형식: Bearer + 발급받은 access_token\n\
          \n - 발급경로: POST /auth/token 또는 POST /auth/token/long-lived 의 응답 값으로 내려온\
          \ access_token\n(nullable)^|Bearer ABCDERAdjflaskjdfosiaetlkfs"
        required: false
        schema:
          type: string
      - name: mallKey
        in: header
        description: " 외부 API 연동키 (외부시스템연동 코드)\n \n ※ server API 호출하는 기존 방식으로, 향후\
          \ fade out될 수 있습니다.<br />\n\n Authorization을 입력을 통한 serverAPI 호출방식 권장드립니\
          다.<br />\n\n (Authorization 입력했을 경우, mallKey는 null로 보내시길 바랍니다.)<br />\n\n\
          \n (nullable)^|각 어드민에서 복사된 값"
        required: false
        schema:
          type: string
        example: QUZjUHlHV0JtdUFrSWVyUmhnRUFTcUt1SzR3ckFRSk0
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/brands488206837'
              examples:
                get-brands-tree-view:
                  value: "[{\"no\":111,\"mainName\":\"NIKE\",\"subName\":\"나이키\",\"\
                    children\":[]}]"
                get-brands:
                  value: "[{\"brandNo\":1,\"displayBrandNo\":1,\"name\":\"나이키\",\"\
                    nameKo\":\"한글 브랜드명\",\"nameEn\":\"영문 브랜드명\",\"nameType\":\"NAME_KO\"\
                    ,\"makerName\":\"나이키\",\"logoImageUrl\":\"www.nike.com/nike.logo\"\
                    ,\"homepageUrl\":\"www.nike.com\",\"description\":\"신규 의류 브랜드\
                    \ 입니다.\",\"displayAreaContentUrl\":\"이미지 정보\",\"extraInfo\":\"\
                    추가 설명입니다.\",\"mainImageContents\":\"세부 내용\",\"detailContents\"\
                    :\"브랜드 이미지 또는 브랜드 관련 동영상 url\"}]"
    put:
      tags:
      - Brand
      summary: 브랜드 수정하기
      description: "## 부가설명 및 특이사항\n            \n브랜드를 수정하는 API 입니다.\n\n한 번에 최대 500개\
        까지 수정할 수 있습니다.\n"
      operationId: modify-brands
      parameters:
      - name: systemKey
        in: header
        description: "\n 시스템 키 (외부시스템 연동을 위한 server API 호출 키)\n - 발급경로: 워크스페이스> 셀러\
          어드민> 신규 앱(App) 등록 시 수정페이지에서 확인가능 \n - 앱 기준으로 systemKey 발급됨\n^|test-system-key"
        required: true
        schema:
          type: string
        example: czFERzFSRGZQY3hwZjQxZTNZd2NTZz09
      - name: Authorization
        in: header
        description: "\n \n 인증토큰 (Bearer 전달받은 토큰)\n \n - 형식: Bearer + 발급받은 access_token\n\
          \n - 발급경로: POST /auth/token 또는 POST /auth/token/long-lived 의 응답 값으로 내려온\
          \ access_token\n(nullable)^|Bearer ABCDERAdjflaskjdfosiaetlkfs"
        required: false
        schema:
          type: string
      - name: mallKey
        in: header
        description: " 외부 API 연동키 (외부시스템연동 코드)\n \n ※ server API 호출하는 기존 방식으로, 향후\
          \ fade out될 수 있습니다.<br />\n\n Authorization을 입력을 통한 serverAPI 호출방식 권장드립니\
          다.<br />\n\n (Authorization 입력했을 경우, mallKey는 null로 보내시길 바랍니다.)<br />\n\n\
          \n (nullable)^|각 어드민에서 복사된 값"
        required: false
        schema:
          type: string
        example: QUZjUHlHV0JtdUFrSWVyUmhnRUFTcUt1SzR3ckFRSk0
      - name: version
        in: header
        description: API 버전^|1.0
        required: true
        schema:
          type: string
        example: "1.0"
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/brands-1783285449'
            examples:
              modify-brands:
                value: "[{\"no\":41,\"depth\":2,\"parentNo\":101,\"mainName\":\"LMC\"\
                  ,\"subName\":\"\",\"displayAreaContentUrl\":\"image.com/lmc/121212\"\
                  ,\"description\":\"의류 브랜드\",\"extraInfo\":\"\",\"brandUseYn\":\"\
                  Y\"}]"
      responses:
        "204":
          description: "204"
    post:
      tags:
      - Brand
      summary: 브랜드 생성하기
      description: "## 부가설명 및 특이사항\n            \n브랜드를 생성하는 API 입니다.\n\n한 번에 최대 500개\
        까지 생성할 수 있습니다.\n\n브랜드명 타입(`NAME_KO`, `NAME_EN`)에 따라 한글 또는 영문 브랜드명이 표시됩니다.\n\
        \n* 동일한 타입에 대해 동일한 브랜드명이 있는 경우, 브랜드 생성이 되지 않고 기존 브랜드가 응답에 포함됩니다.\n\n* 예시:\
        \ `NAME_KO` 타입의 `나이키`라는 한글 브랜드명이 기존에 존재할 때, 동일하게 `NAME_KO` 타입의 한글 브랜드명 `나이\
        키`를 요청한 경우\n"
      operationId: create-brands
      parameters:
      - name: systemKey
        in: header
        description: "\n 시스템 키 (외부시스템 연동을 위한 server API 호출 키)\n - 발급경로: 워크스페이스> 셀러\
          어드민> 신규 앱(App) 등록 시 수정페이지에서 확인가능 \n - 앱 기준으로 systemKey 발급됨\n^|test-system-key"
        required: true
        schema:
          type: string
        example: czFERzFSRGZQY3hwZjQxZTNZd2NTZz09
      - name: Authorization
        in: header
        description: "\n \n 인증토큰 (Bearer 전달받은 토큰)\n \n - 형식: Bearer + 발급받은 access_token\n\
          \n - 발급경로: POST /auth/token 또는 POST /auth/token/long-lived 의 응답 값으로 내려온\
          \ access_token\n(nullable)^|Bearer ABCDERAdjflaskjdfosiaetlkfs"
        required: false
        schema:
          type: string
      - name: mallKey
        in: header
        description: " 외부 API 연동키 (외부시스템연동 코드)\n \n ※ server API 호출하는 기존 방식으로, 향후\
          \ fade out될 수 있습니다.<br />\n\n Authorization을 입력을 통한 serverAPI 호출방식 권장드립니\
          다.<br />\n\n (Authorization 입력했을 경우, mallKey는 null로 보내시길 바랍니다.)<br />\n\n\
          \n (nullable)^|각 어드민에서 복사된 값"
        required: false
        schema:
          type: string
        example: QUZjUHlHV0JtdUFrSWVyUmhnRUFTcUt1SzR3ckFRSk0
      - name: version
        in: header
        description: API 버전^|1.0
        required: true
        schema:
          type: string
        example: "1.0"
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/brands1145846976'
            examples:
              create-brands:
                value: "{\"brands\":[{\"brandNameKo\":\"나이키\",\"brandNameEn\":\"NIKE\"\
                  ,\"brandNameType\":\"NAME_KO\"},{\"brandNameKo\":\"아디다스\",\"brandNameEn\"\
                  :\"ADIDAS\",\"brandNameType\":\"NAME_EN\"}]}"
              create-brands2:
                value: "[{\"parentNo\":0,\"mainName\":\"LMC\",\"subName\":\"\",\"\
                  displayAreaContentUrl\":\"image.com/lmc/121212\",\"description\"\
                  :\"의류 브랜드\",\"extraInfo\":\"\",\"children\":[]}]"
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/brands-795781552'
              examples:
                create-brands:
                  value: "{\"brands\":[{\"brandNo\":0,\"displayBrandNo\":0,\"brandNameKo\"\
                    :\" NIKE\",\"brandNameEn\":\"나이키\",\"brandName\":\"나이키\"}],\"\
                    failureBrands\":[{\"brandNo\":1,\"displayBrandNo\":1,\"brandNameKo\"\
                    :\"아디다스\",\"brandNameEn\":\"ADIDAS\",\"brandName\":\"ADIDAS\"\
                    }]}"
        "204":
          description: "204"
    delete:
      tags:
      - Brand
      summary: 브랜드 삭제하기
      description: "## 부가설명 및 특이사항\n            \n브랜드를 삭제하는 API 입니다.\n\n한 번에 최대 500개\
        까지 삭제할 수 있습니다.\n"
      operationId: delete-brands
      parameters:
      - name: displayBrandNos
        in: query
        description: "삭제할 전시브랜드번호 ','로 다수건 삭제 (1,122,31)"
        required: true
        schema:
          type: number
      - name: systemKey
        in: header
        description: "\n 시스템 키 (외부시스템 연동을 위한 server API 호출 키)\n - 발급경로: 워크스페이스> 셀러\
          어드민> 신규 앱(App) 등록 시 수정페이지에서 확인가능 \n - 앱 기준으로 systemKey 발급됨\n^|test-system-key"
        required: true
        schema:
          type: string
        example: czFERzFSRGZQY3hwZjQxZTNZd2NTZz09
      - name: Authorization
        in: header
        description: "\n \n 인증토큰 (Bearer 전달받은 토큰)\n \n - 형식: Bearer + 발급받은 access_token\n\
          \n - 발급경로: POST /auth/token 또는 POST /auth/token/long-lived 의 응답 값으로 내려온\
          \ access_token\n(nullable)^|Bearer ABCDERAdjflaskjdfosiaetlkfs"
        required: false
        schema:
          type: string
      - name: mallKey
        in: header
        description: " 외부 API 연동키 (외부시스템연동 코드)\n \n ※ server API 호출하는 기존 방식으로, 향후\
          \ fade out될 수 있습니다.<br />\n\n Authorization을 입력을 통한 serverAPI 호출방식 권장드립니\
          다.<br />\n\n (Authorization 입력했을 경우, mallKey는 null로 보내시길 바랍니다.)<br />\n\n\
          \n (nullable)^|각 어드민에서 복사된 값"
        required: false
        schema:
          type: string
        example: QUZjUHlHV0JtdUFrSWVyUmhnRUFTcUt1SzR3ckFRSk0
      - name: version
        in: header
        description: API 버전^|1.0
        required: true
        schema:
          type: string
        example: "1.0"
      responses:
        "204":
          description: "204"
  /brands/{displayBrandNo}:
    get:
      tags:
      - Brand
      summary: 브랜드 상세 조회하기
      description: "## 부가설명 및 특이사항\n            \n브랜드 상세 조회하는 API입니다\n\n* 조회하고자하는\
        \ 브랜드의 depth 순서와는 무관하게 조회 가능합니다.\n"
      operationId: get-brand-detail
      parameters:
      - name: displayBrandNo
        in: path
        description: 전시브랜드 번호^|1
        required: true
        schema:
          type: number
      - name: systemKey
        in: header
        description: "\n 시스템 키 (외부시스템 연동을 위한 server API 호출 키)\n - 발급경로: 워크스페이스> 셀러\
