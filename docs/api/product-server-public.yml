  /products/stock-with-product-management-code:
    put:
      tags:
      - Product
      summary: 상품 관리코드로 재고 변경하기
      description: |2-
         ## 부가설명 및 특이사항
        상품(옵션없음)별 재고를 수정할 수 있습니다.<br />
        요청당 최대 100건 까지 수정 가능합니다.

         ## 응답
         * 전체 성공: 200(OK)
         * 부분 성공: 207(MULTI_STATUS)
         ## 에러 코드
         | 코드 | 내용 |
         | --- | --- |
         | PMEC0001 | 상품 존재하지 않음 |
         | PMEC0002 | 권한 없음 |
         | PMEC0003 | 옵션 없는 상품이 아님 |
         | PMEC0004 | 상품 관리코드에 복수개 상품이 매핑되어 있음 |
         | PMEC9999 | 변경 실패 |
      operationId: put-product-stock-by-product-management-code
      parameters:
      - name: systemKey
        in: header
        description: "\n 시스템 키 (외부시스템 연동을 위한 server API 호출 키)\n - 발급경로: 워크스페이스> 셀러\
          어드민> 신규 앱(App) 등록 시 수정페이지에서 확인가능 \n - 앱 기준으로 systemKey 발급됨\n^|test-system-key"
        required: true
        schema:
          type: string
        example: czFERzFSRGZQY3hwZjQxZTNZd2NTZz09
      - name: Authorization
        in: header
        description: "\n \n 인증토큰 (Bearer 전달받은 토큰)\n \n - 형식: Bearer + 발급받은 access_token\n\
          \n - 발급경로: POST /auth/token 또는 POST /auth/token/long-lived 의 응답 값으로 내려온\
          \ access_token\n(nullable)^|Bearer ABCDERAdjflaskjdfosiaetlkfs"
        required: false
        schema:
          type: string
      - name: mallKey
        in: header
        description: " 외부 API 연동키 (외부시스템연동 코드)\n \n ※ server API 호출하는 기존 방식으로, 향후\
          \ fade out될 수 있습니다.<br />\n\n Authorization을 입력을 통한 serverAPI 호출방식 권장드립니\
          다.<br />\n\n (Authorization 입력했을 경우, mallKey는 null로 보내시길 바랍니다.)<br />\n\n\
          \n (nullable)^|각 어드민에서 복사된 값"
        required: false
        schema:
          type: string
        example: QUZjUHlHV0JtdUFrSWVyUmhnRUFTcUt1SzR3ckFRSk0
      - name: version
        in: header
        description: API 버전^|1.0
        required: true
        schema:
          type: string
        example: "1.0"
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/products-stock-with-product-management-code-234899303'
            examples:
              put-product-stock-by-product-management-code:
                value: "{\"products\":[{\"productManagementCode\":\"stock keeping\
                  \ unit\",\"stock\":100}]}"
      responses:
        "207":
          description: "207"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/products-stock-with-product-management-code-811127546'
              examples:
                put-product-stock-by-product-management-code:
                  value: "{\"failures\":[{\"productManagementCode\":\"stock keeping\
                    \ unit\",\"mallProductNo\":10000000,\"mallProductNos\":[10000000,10000001],\"\
                    errorCode\":\"PMEC0001\",\"message\":\"상품이 존재하지 않습니다.\"}]}"
