    patch:
      tags:
      - Product
      summary: 상품 부분 수정하기 (version 2.0) - DEPRECATED. 3.0을 사용하세요
      description: "## 부가설명 및 특이사항\n            \n상품의 일부를 수정하는 API입니다\n\n수정을 원하는 일\
        부의 값만 수정합니다.\n\n수정이 필요한 필드의 키와 값만 넣습니다.(nullable 한 필드값에 `null` 값으로 요청하는 경우\
        , `null` 값이 반영됩니다.\n\n객체를 수정하는 경우, 객체 내에 수정할 정보를 제외한 나머지는 기존 정보 그대로 입력해야합니\
        다.\n\n* 상품 부분 수정 API는 request body의 1depth를 기준으로 수정이 됩니다.\n\n* 예를 들어 상품 이미\
        지(request body에서 `image.images`)를 수정하려고 하는 경우, 수정하는 값(`image.images`) 외에 다\
        른 값(`image.listImage`, `image.usesExternalImage` 등은 기존 값을 그대로 입력해야합니다.\n\n\
        * 따라서 `image.images`만 수정해서 요청하는 경우, 다른 값(usesExternalImage, listImage) 등은\
        \ 기본 값으로 대체됩니다.\n\n## 상품 안내 정보 (productGuides)\n\n* templateNo 를 모르는 경우 type\
        \ 값만 입력하여 호출 시 해당 파트너에 등록된 상품 안내 정보 템플릿 정보로 저장됩니다.\n\n* 템플릿이 아닌 직접 정보를 입력하\
        고 싶은 경우, type, content 를 입력하여 호출합니다.\n\n## 필수/선택형 옵션\n\n* 해당 옵션을 사용할 경우 optionData.options[].optionType\
        \ = REQUIRED 의 옵션 타입 요청이 필요합니다.\n\n* 해당 옵션은 최소 1개 이상의 필수옵션이 필요합니다.\n\n* option.options[].isRequiredOption의\
        \ Boolean값을 통해 필수/선택 옵션 여부를 설정할 수 있습니다.\n\n* optionName은 `필수옵션` or `선택옵션`으\
        로 고정 되기 때문에 `필수옵션` or `선택옵션`으로 요청해주세요.\n\n## [개발중] 단위가격 총량 계산 (price.unitPriceInfo)\n\
        \n* `price.unitPriceInfo`에 `unitBaseQuantity`, `unitTotalQuantity` 필드가 추가되\
        었습니다.\n\n* 두 필드 모두 입력 시, 내부적으로 unitName이 `\"unitBaseQuantity|unitTotalQuantity\"\
        ` 형식으로 자동 변환됩니다.\n\n* 기존 `unitName` 필드만 사용하는 방식도 그대로 호환됩니다.\n\n* 예시) unitBaseQuantity=1,\
        \ unitTotalQuantity=10, unitNameType=\"팩\", unitPrice=500 → 1팩당 500원, 총 10팩\
        \n\n* 주의: unitTotalQuantity < unitBaseQuantity 인 경우 INVALID_UNIT_BASE_QUANTITY\
        \ 오류\n"
