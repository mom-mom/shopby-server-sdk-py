  /products/by-stickers:
    get:
      tags:
      - Product
      summary: 스티커 번호로 상품 정보 조회하기
      description: "## 부가설명 및 특이사항\n            \n스티커 번호로 상품 정보를 조회하는 API입니다\n"
      operationId: get-product-by-sticker-nos
      parameters:
      - name: stickerNos
        in: query
        description: "스티커 번호(쉼표 구분)^|1,2"
        required: true
        schema:
          type: string
      - name: size
        in: query
        description: "조회할 상품 개수(default: 10)^|10"
        required: false
        schema:
          type: number
      - name: searchAfter
        in: query
        description: 검색 기준 값(response의 lastId)^|10000002
        required: true
        schema:
          type: number
      - name: systemKey
        in: header
        description: "\n 시스템 키 (외부시스템 연동을 위한 server API 호출 키)\n - 발급경로: 워크스페이스> 셀러\
          어드민> 신규 앱(App) 등록 시 수정페이지에서 확인가능 \n - 앱 기준으로 systemKey 발급됨\n^|test-system-key"
        required: true
        schema:
          type: string
        example: czFERzFSRGZQY3hwZjQxZTNZd2NTZz09
      - name: Authorization
        in: header
        description: "\n \n 인증토큰 (Bearer 전달받은 토큰)\n \n - 형식: Bearer + 발급받은 access_token\n\
          \n - 발급경로: POST /auth/token 또는 POST /auth/token/long-lived 의 응답 값으로 내려온\
          \ access_token\n(nullable)^|Bearer ABCDERAdjflaskjdfosiaetlkfs"
        required: false
        schema:
          type: string
      - name: mallKey
        in: header
        description: " 외부 API 연동키 (외부시스템연동 코드)\n \n ※ server API 호출하는 기존 방식으로, 향후\
          \ fade out될 수 있습니다.<br />\n\n Authorization을 입력을 통한 serverAPI 호출방식 권장드립니\
          다.<br />\n\n (Authorization 입력했을 경우, mallKey는 null로 보내시길 바랍니다.)<br />\n\n\
          \n (nullable)^|각 어드민에서 복사된 값"
        required: false
        schema:
          type: string
        example: QUZjUHlHV0JtdUFrSWVyUmhnRUFTcUt1SzR3ckFRSk0
      - name: version
        in: header
        description: API 버전^|1.0
        required: true
        schema:
          type: string
        example: "1.0"
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/products-by-stickers-835861226'
              examples:
                get-product-by-sticker-nos:
                  value: "{\"totalCount\":2,\"totalPage\":1,\"contents\":[{\"productNo\"\
                    :10000001,\"productName\":\"상품1\",\"stickerNos\":[1,2]},{\"productNo\"\
                    :10000002,\"productName\":\"상품2\",\"stickerNos\":[1]}],\"lastId\"\
                    :\"2\"}"
  /products/changed:
    get:
      tags:
      - Product
      summary: 변경된 상품 번호 목록 조회
      description: |2-
         ## 부가설명 및 특이사항
        조회 기준시점을 기준으로 이후에 등록 / 수정된 상품번호 목록을 조회할 수 있습니다.<br />
        * 정렬순서(direction)을 설정하지 않는 경우 ASC(오름차순)이 적용됩니다.<br />
        * 정렬기준이 UPDATED_AT 일때 `재고변경이력 포함여부`가 사용 가능합니다.<br />
        * partnerNo 파라미터는 자사파트너(쇼핑몰배송)의 경우에만 사용 가능합니다. 그 외의 경우(일반파트너사)는 사용 불가능합니다.<br />
        * partnerNo를 요청 파라미터에 넣는 경우, 해당 파트너사의 상품만 조회됩니다.<br />
        * 단, 일반파트너사의 경우에는 partnerNo를 사용하지 않아도 해당 파트너사의 상품만 조회합니다.
         ## 검색 방식
        * 아래 두 가지 검색방식을 모두 지원합니다.
        * (기존) paging search : page 값 필수 (최초 조회 시 생략 가능)
        * (신규) keySet search : searchAfter 필수, 정렬기준이 REGISTERED_AT 일때만 사용가능. (최초 조회 시 생략 가능. response의 lastId 값 사용.)
      operationId: get-product-changed
      parameters:
      - name: asOf
        in: query
        description: 조회 기준시점^|yyyy-MM-dd HH:mm:ss
        required: true
        schema:
          type: string
      - name: sortBy
        in: query
        description: "정렬 기준 Enum: [ REGISTERED_AT: 등록일, UPDATED_AT: 수정일 ]^|REGISTERED_AT"
        required: true
        schema:
          type: string
      - name: direction
        in: query
        description: "정렬 방향 Enum: [ ASC: 오름차순, DESC: 내림차순 ]^|ASC"
        required: false
        schema:
          type: string
      - name: includingStockChanges
        in: query
        description: "재고변경이력 포함여부 (default: true, 정렬기준이 UPDATED_AT 일때만 적용가능)^|false"
        required: false
        schema:
          type: boolean
      - name: page
        in: query
        description: "페이지 번호(default: 1)^|1"
        required: false
        schema:
          type: number
      - name: size
        in: query
        description: 페이지 사이즈^|100
        required: true
        schema:
          type: number
      - name: searchAfter
        in: query
        description: 검색 기준 값(lastId)^|1
        required: false
        schema:
          type: string
      - name: systemKey
        in: header
        description: "\n 시스템 키 (외부시스템 연동을 위한 server API 호출 키)\n - 발급경로: 워크스페이스> 셀러\
          어드민> 신규 앱(App) 등록 시 수정페이지에서 확인가능 \n - 앱 기준으로 systemKey 발급됨\n^|test-system-key"
        required: true
        schema:
          type: string
        example: czFERzFSRGZQY3hwZjQxZTNZd2NTZz09
      - name: Authorization
        in: header
        description: "\n \n 인증토큰 (Bearer 전달받은 토큰)\n \n - 형식: Bearer + 발급받은 access_token\n\
          \n - 발급경로: POST /auth/token 또는 POST /auth/token/long-lived 의 응답 값으로 내려온\
          \ access_token\n(nullable)^|Bearer ABCDERAdjflaskjdfosiaetlkfs"
        required: false
        schema:
          type: string
      - name: mallKey
        in: header
        description: " 외부 API 연동키 (외부시스템연동 코드)\n \n ※ server API 호출하는 기존 방식으로, 향후\
          \ fade out될 수 있습니다.<br />\n\n Authorization을 입력을 통한 serverAPI 호출방식 권장드립니\
          다.<br />\n\n (Authorization 입력했을 경우, mallKey는 null로 보내시길 바랍니다.)<br />\n\n\
          \n (nullable)^|각 어드민에서 복사된 값"
        required: false
        schema:
          type: string
        example: QUZjUHlHV0JtdUFrSWVyUmhnRUFTcUt1SzR3ckFRSk0
      - name: version
        in: header
        description: API 버전^|1.0
        required: true
        schema:
          type: string
        example: "1.0"
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/products-changed1897605776'
              examples:
                get-product-changed:
                  value: "{\"totalCount\":1,\"totalPage\":1,\"contents\":[{\"productNo\"\
                    :1011023,\"registeredAt\":\"2020-12-11 08:49:52\",\"updatedAt\"\
                    :\"2020-12-12 15:12:43\"}],\"lastId\":\"\"}"
