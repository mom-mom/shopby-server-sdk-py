          type: number
          description: 전체 상품 수
        displayableStock:
          type: boolean
          description: "\n 재고 노출 여부 (false:재고 미노출 / true:재고 노출)<br><br>\n false로 재\
            고를 숨김처리 한 경우,\n 1) 재고 관련 필드는(실제 재고가 있더라도) -999로 고정으로 리턴하며 실재고 값은 따로 내려\
            주지 않아 조회 불가합니다.    \n 2) 실재고가 0인 경우에만 0으로 응답합니다.      \n   만약 재고 숨김처리\
