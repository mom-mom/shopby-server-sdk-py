  /display/events/{eventNo}:
    get:
      tags:
      - Event
      summary: 기획전 상세 조회하기
      description: "## 부가설명 및 특이사항\n            \n ### 해당 API는 Deprecated 되고 향후 다른\
        \ API로 대체될 예정입니다.\n ### 변경 사항이 발생하면 공지를 통해 안내드리겠습니다.\n 기획전을 조회하는 API입니다.\n\
        \n* 현재 진행중인 기획전만 조회되고, 그 이외(진행대기, 종료)에는 조회되지 않습니다.\n\n* 플랫폼별, 멤버그룹별, 멤버등급별\
        에 따라 접근 불가능한 기획전은 조회되지 않습니다.\n\n* 에러코드: EVEC0001(기획전이 존재하지 않는 경우), EVEC0002(현\
        재 진행중인 기획전이 아닌 경우), EVEC0003(접근할 수 없는 기획전인 경우)\n\n* hasProductDetail 이 false\
        \ 인 경우 soldout, order, saleStatus 정보는 무시됩니다.\n\n* hasProductDetail 이 false\
        \ 인 경우 section.products 의 정보는 emptyList 로 내려갑니다. section.productNos 에서 상품번\
        호만 확인 가능합니다.\n\n* hasProductDetail 이 false 인 경우 section.productNos의 상품번호는\
        \ 상품상태, 판매기간, 회원등급/그룹, 플랫폼 구분을 체크하지 않고 기획전에 설정된 상품번호들을 내려줍니다.\n\n ### OAUTH2\
        \ 참고사항\n* [Oauth2 API](https://docs.shopby.co.kr/?url.primaryName=auth/#/OAUTH2/post-oauth2-token)\
        \ 를 사용하여 토큰을 발급받은 경우,\n* 기존 accessToken 대신 Shop-By-Authorization 로 액세스 토큰을\
        \ 전달해야합니다.\n* ex) Shop-By-Authorization : Bearer test-access-token\n"
      operationId: get-event
      parameters:
      - name: eventNo
        in: path
        description: 기획전 번호
        required: true
        schema:
          type: number
      - name: order
        in: query
        description: "정렬조건(SALE: 판매시작일 오름차순 - default, ADMIN_SETTING: 관리자 설정 순서, BEST_SELLER:\
          \ 판매순, BEST_REVIEW: 리뷰순)"
        required: false
        schema:
          type: string
      - name: soldout
        in: query
        description: "품절 상품 포함 여부(default: false)"
        required: false
        schema:
          type: boolean
      - name: saleStatus
        in: query
        description: "판매 상태 (판매대기, 판매중 상품만 조회: READY_ONSALE, 판매중인 상품만 조회: ONSALE,\
          \ 예약판매중인 상품과 판매중인 상품만 조회: RESERVATION_AND_ONSALE)"
        required: false
