  /display/events/products/{productNo}:
    get:
      tags:
      - Event
      summary: 특정 상품을 포함하는 이벤트 목록 조회하기
      description: "## 부가설명 및 특이사항\n            \n특정 상품을 포함하는 이벤트 목록 조회 API입니다\n\n\
        1일 캐시하여 사용하고 있습니다. (cached)\n\n ### OAUTH2 참고사항\n* [Oauth2 API](https://docs.shopby.co.kr/?url.primaryName=auth/#/OAUTH2/post-oauth2-token)\
        \ 를 사용하여 토큰을 발급받은 경우,\n* 기존 accessToken 대신 Shop-By-Authorization 로 액세스 토큰을\
        \ 전달해야합니다.\n* ex) Shop-By-Authorization : Bearer test-access-token\n"
      operationId: get-events-by-product-no
      parameters:
      - name: productNo
        in: path
        description: 상품 번호
        required: true
        schema:
          type: number
      - name: Version
        in: header
        description: API 버전
        required: true
        schema:
          type: string
        example: "1.0"
      - name: accessToken
        in: header
        description: 회원 엑세스 토큰(OAuth2 스펙)
        required: false
        schema:
          type: string
        example: AccessToken
      - name: clientId
        in: header
        description: 쇼핑몰 클라이언트 아이디
        required: true
        schema:
          type: string
        example: test-client-id
      - name: platform
        in: header
        description: "PC - PC 웹 브라우저에서 접근 시, MOBILE_WEB - 모바일 웹 브라우저에서 접근 시, AOS -\
          \ Android 앱에서 접근 시, IOS - iOS 앱에서 접근 시"
        required: true
        schema:
          type: string
        example: PC
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/display-events-products-productNo887382951'
              examples:
                get-events-by-product-no:
                  value: "[{\"eventNo\":1,\"label\":\"1번 이벤트\",\"url\":\"http://shop.com/eventpage\"\
