        .\n\n현재 진행중인 기획전만 조회되고, 그 이외(진행대기, 종료)에는 조회되지 않습니다.\n\n플랫폼별, 멤버그룹별, 멤버등급별에\
        \ 따라 접근 불가능한 기획전은 조회되지 않습니다.\n\n에러코드: EVEC0001(기획전이 존재하지 않는 경우), EVEC0002(현\
        재 진행중인 기획전이 아닌 경우), EVEC0003(접근할 수 없는 기획전인 경우)\n\n ### OAUTH2 참고사항\n* [Oauth2\
