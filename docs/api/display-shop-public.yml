  /display/events/search-by-progress:
    get:
      tags:
      - Event
      summary: "키워드별, 진행상태별로 기획전 검색하기"
      description: "## 부가설명 및 특이사항\n            \n키워드별(기획전명 or 태그)와 진행상태별(진행중 or 진\
        행종료 or 진행예정)로 기획전을 조회하는 API입니다.\n\n ### OAUTH2 참고사항\n* [Oauth2 API](https://docs.shopby.co.kr/?url.primaryName=auth/#/OAUTH2/post-oauth2-token)\
        \ 를 사용하여 토큰을 발급받은 경우,\n* 기존 accessToken 대신 Shop-By-Authorization 로 액세스 토큰을\
        \ 전달해야합니다.\n* ex) Shop-By-Authorization : Bearer test-access-token\n"
      operationId: get-event-by-keyword-and-progress
      parameters:
      - name: keyword
        in: query
        description: 검색어 (키워드 타입에 따라 태그 or 기획전명)
        required: true
        schema:
          type: string
      - name: keywordType
        in: query
        description: "검색어 타입 (TAG, NAME / default: 모두 포함)"
        required: false
        schema:
          type: string
      - name: categoryNos
        in: query
        description: 전시 카테고리 번호로 검색
        required: false
        schema:
          type: number
      - name: progressStatus
        in: query
        description: "진행상태 (ING - 진행중, READY - 진행예정, END - 진행종료, ALL / default: ING)\
          \ (공백없이 입력)"
        required: false
        schema:
          type: string
      - name: Version
        in: header
        description: API 버전
        required: true
        schema:
          type: string
        example: "1.0"
      - name: accessToken
        in: header
        description: 회원 엑세스 토큰(OAuth2 스펙)
        required: false
        schema:
          type: string
        example: AccessToken
      - name: clientId
        in: header
        description: 쇼핑몰 클라이언트 아이디
        required: true
        schema:
          type: string
        example: test-client-id
      - name: platform
        in: header
        description: "PC - PC 웹 브라우저에서 접근 시, MOBILE_WEB - 모바일 웹 브라우저에서 접근 시, AOS -\
          \ Android 앱에서 접근 시, IOS - iOS 앱에서 접근 시"
        required: true
        schema:
          type: string
        example: PC
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/display-events-search-by-name-443989176'
              examples:
                get-event-by-keyword-and-progress:
                  value: "[{\"eventNo\":1,\"label\":\"10월 세일 이벤트\",\"url\":\"http://shop.com/eventpage\"\
                    ,\"id\":\"KO0001\",\"urlType\":\"DIRECT\",\"displayPeriodType\"\
                    :\"REGULAR\",\"startYmdt\":\"2020-01-01T00:00:00\",\"endYmdt\"\
                    :\"2030-12-31T12:59:59\",\"pcImageUrl\":\"http://shop.com/eventpage\"\
                    ,\"mobileimageUrl\":\"http://shop.com/eventpage\",\"promotionText\"\
                    :\"이벤트 홍보 문구\",\"tag\":\"프로모션\",\"eventYn\":\"Y\",\"progressStatus\"\
                    :\"ING\"}]"
