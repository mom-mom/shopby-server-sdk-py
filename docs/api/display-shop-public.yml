openapi: 3.0.1
info:
  title: display-shop
  description: ' 상품 전시(display) 관련 shop API입니다.'
  version: 0.0.1-SNAPSHOT
servers:
- url: https://shop-api.e-ncp.com
tags:
- name: Banner
  description: 배너
- name: Category
  description: 카테고리
- name: Review
  description: 상품평
- name: Event
  description: 기획전
- name: Popup
  description: 팝업
- name: ProductSection
  description: 상품 진열 관리
- name: ProductInquiry
  description: 상품 문의
paths:
  /categories:
    get:
      tags:
      - Category
      summary: 전체 카테고리 조회하기
      description: "## 부가설명 및 특이사항\n            \n키워드로 카테고리를 조회하는 API입니다\n\n* 계층을\
        \ 가지는 카테고리 목록(multiLevelCategories)을 조회합니다 (최대 5 depth)\n\n* 원본 카테고리 목록(flatCategories)을\
        \ 조회합니다\n\n1일 캐시하여 사용하고 있습니다. (cached)\n\n ### OAUTH2 참고사항\n* [Oauth2 API](https://docs.shopby.co.kr/?url.primaryName=auth/#/OAUTH2/post-oauth2-token)\
        \ 를 사용하여 토큰을 발급받은 경우,\n* 기존 accessToken 대신 Shop-By-Authorization 로 액세스 토큰을\
        \ 전달해야합니다.\n* ex) Shop-By-Authorization : Bearer test-access-token\n"
      operationId: get-categories-by-keyword
      parameters:
      - name: keyword
        in: query
        description: 카테고리명
        required: false
        schema:
          type: string
      - name: categoryViewType
        in: query
        description: "카테고리 응답 형식 (ALL: 전체(default), MULTI_LEVEL: 트리 구조만, FLAT: 평탄화\
          \ 구조만)"
        required: false
        schema:
          type: string
      - name: Version
        in: header
        description: API 버전
        required: true
        schema:
          type: string
        example: "1.0"
      - name: clientId
        in: header
        description: 쇼핑몰 클라이언트 아이디
        required: true
        schema:
          type: string
        example: test-client-id
      - name: platform
        in: header
        description: "PC - PC 웹 브라우저에서 접근 시, MOBILE_WEB - 모바일 웹 브라우저에서 접근 시, AOS -\
          \ Android 앱에서 접근 시, IOS - iOS 앱에서 접근 시"
        required: true
        schema:
          type: string
        example: PC
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/categories-238649777'
              examples:
                get-categories-by-keyword:
                  value: "{\"multiLevelCategories\":[{\"categoryNo\":10010,\"label\"\
                    :\"10010번 카테고리\",\"depth\":1,\"icon\":\"http://image.toast.com/abcd/mouse_over.png\"\
                    ,\"content\":\"multiContent\",\"managementCode\":\"10010번 카테고리\
                    \ 코드\",\"children\":[]}],\"flatCategories\":[{\"depth1CategoryNo\"\
                    :10010,\"depth1Label\":\"10010번 카테고리\",\"depth1DisplayOrder\"\
                    :1,\"depth1Icon\":\"http://image.toast.com/abcd/mouse_over.png\"\
                    ,\"depth1Content\":\"depthContent\",\"depth1ManagementCode\":\"\
                    1뎁스 카테고리 코드\",\"fullCategoryName\":\"카테고리이름\",\"depth2CategoryNo\"\
                    :10011,\"depth2Label\":\"10010번 카테고리\",\"depth2DisplayOrder\"\
                    :2,\"depth2Icon\":\"http://image.toast.com/abcd/mouse_over.png\"\
                    ,\"depth2Content\":\"depthContent\",\"depth2ManagementCode\":\"\
                    2뎁스 카테고리 코드\",\"depth3CategoryNo\":10012,\"depth3Label\":\"10010번\
                    \ 카테고리\",\"depth3DisplayOrder\":3,\"depth3Icon\":\"http://image.toast.com/abcd/mouse_over.png\"\
                    ,\"depth3Content\":\"depthContent\",\"depth3ManagementCode\":\"\
                    3뎁스 카테고리 코드\",\"depth4CategoryNo\":10013,\"depth4Label\":\"10010번\
                    \ 카테고리\",\"depth4DisplayOrder\":4,\"depth4Icon\":\"http://image.toast.com/abcd/mouse_over.png\"\
                    ,\"depth4Content\":\"depthContent\",\"depth4ManagementCode\":\"\
                    4뎁스 카테고리 코드\",\"depth5CategoryNo\":10014,\"depth5Label\":\"10010번\
                    \ 카테고리\",\"depth5DisplayOrder\":5,\"depth5Icon\":\"http://image.toast.com/abcd/mouse_over.png\"\
                    ,\"depth5Content\":\"depthContent\",\"depth5ManagementCode\":\"\
                    5뎁스 카테고리 코드\"}]}"
  /categories/new-product-categories:
    get:
      tags:
      - Category
      summary: 신상품이 있는 카테고리 조회하기
      description: "## 부가설명 및 특이사항\n            \n판매 시작일이 1주일 이내인 상품이 존재하는 카테고리 조회\
        하는 API입니다\n\n ### OAUTH2 참고사항\n* [Oauth2 API](https://docs.shopby.co.kr/?url.primaryName=auth/#/OAUTH2/post-oauth2-token)\
        \ 를 사용하여 토큰을 발급받은 경우,\n* 기존 accessToken 대신 Shop-By-Authorization 로 액세스 토큰을\
        \ 전달해야합니다.\n* ex) Shop-By-Authorization : Bearer test-access-token\n"
      operationId: get-new-product-categories
      parameters:
      - name: Version
        in: header
        description: API 버전
        required: true
        schema:
          type: string
        example: "1.0"
      - name: clientId
        in: header
        description: 쇼핑몰 클라이언트 아이디
        required: true
        schema:
          type: string
        example: test-client-id
      - name: platform
        in: header
        description: "PC - PC 웹 브라우저에서 접근 시, MOBILE_WEB - 모바일 웹 브라우저에서 접근 시, AOS -\
          \ Android 앱에서 접근 시, IOS - iOS 앱에서 접근 시"
        required: true
        schema:
          type: string
        example: PC
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/categories-new-product-categories-1474126714'
              examples:
                get-new-product-categories:
                  value: "[1,2,3]"
  /categories/search-by-management-code:
    post:
      tags:
      - Category
      summary: 관리코드로 카테고리 번호를 조회하기
      description: "## 부가설명 및 특이사항\n            \n전시카테고리 관리코드로 카테고리 번호를 조회하는 API 입\
        니다\n\n ### OAUTH2 참고사항\n* [Oauth2 API](https://docs.shopby.co.kr/?url.primaryName=auth/#/OAUTH2/post-oauth2-token)\
        \ 를 사용하여 토큰을 발급받은 경우,\n* 기존 accessToken 대신 Shop-By-Authorization 로 액세스 토큰을\
        \ 전달해야합니다.\n* ex) Shop-By-Authorization : Bearer test-access-token\n"
      operationId: get-category-nos-by-codes
      parameters:
      - name: Version
        in: header
        description: API 버전
        required: true
        schema:
          type: string
        example: "1.0"
      - name: clientId
        in: header
        description: 쇼핑몰 클라이언트 아이디
        required: true
        schema:
          type: string
        example: test-client-id
      - name: platform
        in: header
        description: "PC - PC 웹 브라우저에서 접근 시, MOBILE_WEB - 모바일 웹 브라우저에서 접근 시, AOS -\
          \ Android 앱에서 접근 시, IOS - iOS 앱에서 접근 시"
        required: true
        schema:
          type: string
        example: PC
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/categories-search-by-management-code1690049551'
            examples:
              get-category-nos-by-codes:
                value: "{\"codes\":[\"관리코드\"]}"
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/categories-search-by-management-code1438015983'
              examples:
                get-category-nos-by-codes:
                  value: "[{\"displayCategoryNo\":1,\"code\":\"관리코드\"}]"
  /categories/simple-1depth:
    get:
      tags:
      - Category
      summary: 1차 카테고리 간단 정보 조회하기
      description: "## 부가설명 및 특이사항\n            \n1차 카테고리 관련 간단한 정보를 조회하는 API 입니다\n\
        \n ### OAUTH2 참고사항\n* [Oauth2 API](https://docs.shopby.co.kr/?url.primaryName=auth/#/OAUTH2/post-oauth2-token)\
        \ 를 사용하여 토큰을 발급받은 경우,\n* 기존 accessToken 대신 Shop-By-Authorization 로 액세스 토큰을\
        \ 전달해야합니다.\n* ex) Shop-By-Authorization : Bearer test-access-token\n"
      operationId: get-categories-simple-1depth
      parameters:
      - name: Version
        in: header
        description: API 버전
        required: true
        schema:
          type: string
        example: "1.0"
      - name: clientId
        in: header
        description: 쇼핑몰 클라이언트 아이디
        required: true
        schema:
          type: string
        example: test-client-id
      - name: platform
        in: header
        description: "PC - PC 웹 브라우저에서 접근 시, MOBILE_WEB - 모바일 웹 브라우저에서 접근 시, AOS -\
          \ Android 앱에서 접근 시, IOS - iOS 앱에서 접근 시"
        required: true
        schema:
          type: string
        example: PC
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/categories-simple-1depth1374229175'
              examples:
                get-categories-simple-1depth:
                  value: "[{\"displayCategoryNo\":1,\"displayCategoryName\":\"카테고리\
                    명\",\"displayManagementCode\":\"카테고리 코드\"}]"
  /categories/{categoryNo}:
    get:
      tags:
      - Category
      summary: 카테고리 조회하기
      description: "## 부가설명 및 특이사항\n            \n카테고리 번호로 카테고리를 조회하는 API입니다\n\n*\
        \ 계층을 가지는 카테고리 목록(multiLevelCategories)을 조회합니다 (최대 5 depth)\n\n* 원본 카테고리 목\
        록(flatCategories)을 조회합니다\n\n ### OAUTH2 참고사항\n* [Oauth2 API](https://docs.shopby.co.kr/?url.primaryName=auth/#/OAUTH2/post-oauth2-token)\
        \ 를 사용하여 토큰을 발급받은 경우,\n* 기존 accessToken 대신 Shop-By-Authorization 로 액세스 토큰을\
        \ 전달해야합니다.\n* ex) Shop-By-Authorization : Bearer test-access-token\n"
      operationId: get-category
      parameters:
      - name: categoryNo
        in: path
        description: 카테고리 번호
        required: true
        schema:
          type: number
      - name: needsBrands
        in: query
        description: "브랜드 정보 조회 여부 (default: true)"
        required: false
        schema:
          type: boolean
      - name: categoryViewType
        in: query
        description: "카테고리 응답 형식 (ALL: 전체(default), MULTI_LEVEL: 트리 구조만, FLAT: 평탄화\
          \ 구조만)"
        required: false
        schema:
          type: string
      - name: Version
        in: header
