      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/categories-categoryNo-675990724'
              examples:
                get-category:
                  value: "{\"multiLevelCategories\":[{\"categoryNo\":10010,\"label\"\
                    :\"10010번 카테고리\",\"depth\":1,\"icon\":\"http://image.toast.com/abcd/mouse_over.png\"\
                    ,\"content\":\"content..\",\"managementCode\":\"10010번 카테고리 코드\
                    \",\"children\":[]}],\"flatCategories\":[{\"depth1CategoryNo\"\
                    :10010,\"depth1Label\":\"10010번 카테고리\",\"depth1DisplayOrder\"\
                    :1,\"depth1Icon\":\"http://image.toast.com/abcd/mouse_over.png\"\
                    ,\"depth1Content\":\"content1depth..\",\"depth1ManagementCode\"\
                    :\"1뎁스 카테고리 코드\",\"fullCategoryName\":\"1뎁스카테고리\",\"depth2CategoryNo\"\
                    :10011,\"depth2Label\":\"10010번 카테고리\",\"depth2DisplayOrder\"\
                    :2,\"depth2Icon\":\"http://image.toast.com/abcd/mouse_over.png\"\
                    ,\"depth2Content\":\"depthContent\",\"depth2ManagementCode\":\"\
                    2뎁스 카테고리 코드\",\"depth3CategoryNo\":10012,\"depth3Label\":\"10010번\
                    \ 카테고리\",\"depth3DisplayOrder\":3,\"depth3Icon\":\"http://image.toast.com/abcd/mouse_over.png\"\
                    ,\"depth3Content\":\"depthContent\",\"depth3ManagementCode\":\"\
                    3뎁스 카테고리 코드\",\"depth4CategoryNo\":10013,\"depth4Label\":\"10010번\
                    \ 카테고리\",\"depth4DisplayOrder\":4,\"depth4Icon\":\"http://image.toast.com/abcd/mouse_over.png\"\
                    ,\"depth4Content\":\"depthContent\",\"depth4ManagementCode\":\"\
                    4뎁스 카테고리 코드\",\"depth5CategoryNo\":10014,\"depth5Label\":\"10010번\
                    \ 카테고리\",\"depth5DisplayOrder\":5,\"depth5Icon\":\"http://image.toast.com/abcd/mouse_over.png\"\
                    ,\"depth5Content\":\"depthContent\",\"depth5ManagementCode\":\"\
                    5뎁스 카테고리 코드\"}],\"brands\":[{\"brandNo\":1,\"name\":\"1번 브랜드\"\
                    ,\"productCnt\":10}],\"requestedCategoryNo\":1}"
  /categories/{categoryNo}/display-setting:
    get:
      tags:
      - Category
      summary: 카테고리 진열 설정 조회하기
      description: "## 부가설명 및 특이사항\n            \n카테고리의 진열 설정(자동/수동)을 조회하는 API입니다\n\
        \n* AUTO: 자동 진열\n\n* MANUAL: 수동 진열\n\n ### OAUTH2 참고사항\n* [Oauth2 API](https://docs.shopby.co.kr/?url.primaryName=auth/#/OAUTH2/post-oauth2-token)\
        \ 를 사용하여 토큰을 발급받은 경우,\n* 기존 accessToken 대신 Shop-By-Authorization 로 액세스 토큰을\
        \ 전달해야합니다.\n* ex) Shop-By-Authorization : Bearer test-access-token\n"
      operationId: get-category-display-setting
      parameters:
      - name: categoryNo
        in: path
        description: 카테고리 번호
        required: true
        schema:
          type: number
      - name: Version
        in: header
        description: API 버전
        required: true
        schema:
          type: string
        example: "1.0"
      - name: clientId
        in: header
        description: 쇼핑몰 클라이언트 아이디
        required: true
        schema:
          type: string
        example: test-client-id
      - name: platform
        in: header
        description: "PC - PC 웹 브라우저에서 접근 시, MOBILE_WEB - 모바일 웹 브라우저에서 접근 시, AOS -\
          \ Android 앱에서 접근 시, IOS - iOS 앱에서 접근 시"
        required: true
        schema:
          type: string
        example: PC
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/categories-categoryNo-display-setting-1154835717'
              examples:
                get-category-display-setting:
                  value: "{\"displayType\":\"MANUAL\",\"pinEnabled\":\"Y\"}"
  /category/product-reviews:
    get:
      tags:
      - Review
      summary: 카테고리 상품평 목록 조회하기
      description: "## 부가설명 및 특이사항\n            \n카테고리 별 상품평 목록 조회하는 API입니다\n\n###\
        \ OAUTH2 참고사항\n* [Oauth2 API](https://docs.shopby.co.kr/?url.primaryName=auth/#/OAUTH2/post-oauth2-token)\
        \ 를 사용하여 토큰을 발급받은 경우,\n* 기존 accessToken 대신 Shop-By-Authorization 로 액세스 토큰을\
        \ 전달해야합니다.\n* ex) Shop-By-Authorization : Bearer test-access-token\n\nPaging\
        \ 기능 제공합니다\n\n정렬 기준(모든 정렬은 1차적으로 정렬된 후, 최근 등록된 순으로 한 번 더 정렬됩니다.)\n\n* RATING\
        \ - 상품평 평점순\n\n* RECOMMEND - 상품평 추천순\n\n* REGISTER_YMDT - 상품평 등록순\n\n* BEST_REVIEW\
        \ - 우수 상품평순(DESC: 우수 상품평 먼저 조회, ASC: 일반 상품평 먼저 조회)\n\nhasOrderedOption 을 false로\
        \ 설정 했을 때, orderedOption 항목은 디폴트 옵션 정보 값으로 내려갑니다. (default: false)\n\n* 주문\
        \ 옵션 정보 필요한 경우 hasOrderedOption=true 로 설정하여 요청하시기 바랍니다.\n## 화면 예시\n      \
        \          \n[![IMG_CATEGORY_REVIEW_GET](http://image.toast.com/aaaaahb/api-description/product/%EC%83%81%ED%92%88%ED%8F%89/[GET]%20category_product-reviews%20%EC%B9%B4%ED%85%8C%EA%B3%A0%EB%A6%AC%20%EC%83%81%ED%92%88%ED%8F%89%20%EB%AA%A9%EB%A1%9D.png?autox150)](http://image.toast.com/aaaaahb/api-description/product/%EC%83%81%ED%92%88%ED%8F%89/[GET]%20category_product-reviews%20%EC%B9%B4%ED%85%8C%EA%B3%A0%EB%A6%AC%20%EC%83%81%ED%92%88%ED%8F%89%20%EB%AA%A9%EB%A1%9D.png)"
      operationId: get-category-product-reviews
      parameters:
      - name: hasAttachmentFile
        in: query
        description: "첨부 파일 여부 (default : false)"
        required: false
        schema:
          type: boolean
      - name: categoryDepth
        in: query
        description: 카테고리 깊이
        required: true
        schema:
          type: number
      - name: categoryNo
        in: query
        description: 카테고리 번호
        required: true
        schema:
          type: number
      - name: productName
        in: query
        description: 상품명
        required: false
        schema:
          type: string
      - name: order.by
        in: query
        description: "정렬 기준 (추천순: RECOMMEND, 등록일순: REGISTER_YMDT, 평점순: RATING, 베스트\
          리뷰순: BEST_REVIEW)"
        required: true
        schema:
          type: string
      - name: order.direction
        in: query
        description: "정렬 순서 (default: DESC) (오름차순: ASC, 내림차순: DESC)"
        required: true
        schema:
          type: string
      - name: brandName
        in: query
        description: 브랜드 명
        required: false
        schema:
          type: string
      - name: bestReviewYn
        in: query
        description: "베스트 상품평 여부 ( 우수상품평:Y , 일반상품평:N , 전체: NULL - default)"
        required: false
        schema:
          type: string
      - name: myReviewYn
