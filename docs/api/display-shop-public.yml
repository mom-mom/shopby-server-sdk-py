  /products/{productNo}/product-reviews:
    get:
      tags:
      - Review
      summary: 상품평 목록 조회하기 2.0
      description: "## 부가설명 및 특이사항\n            \n상품 별 상품평 목록을 조회하는 API입니다\n\nPaging\
        \ 기능 제공합니다\n\n정렬 기준(모든 정렬은 1차적으로 정렬된 후, 최근 등록된 순으로 한 번 더 정렬됩니다.)\n\nREGISTER_YMDT\
        \ 정렬 시 외부 상품평은 외부 사이트의 원본 등록 기준으로 정렬됩니다.\n\n* RATING - 상품평 평점순\n\n* RECOMMEND\
        \ - 상품평 추천순\n\n* REGISTER_YMDT - 상품평 등록순\n\n* BEST_REVIEW - 우수 상품평순(DESC:\
        \ 우수 상품평 먼저 조회, ASC: 일반 상품평 먼저 조회)\n\nhasProductInfo 를 false 로 설정하였을때 다음의\
        \ 항목은 빈값으로 내려갑니다. (default: true)\n\n* productName, productNameEn, memberGradeDisplayInfo,\
        \ memberGroupDisplayInfo, isDeletedProductReview\n\n* brandName, brandNameEn,\
        \ imageUrl, imageUrlType, orderedOption, productDiscountPrice\n\n* 상품정보를 이\
        미 조회하여 알고 있는 경우 hasProductInfo=false 로 설정하여 요청하시기 바랍니다.\n\nhasOrderedOption\
        \ 을 false로 설정 했을 때, orderedOption 항목은 디폴트 옵션 정보 값으로 내려갑니다. (default: false)\n\
        \n* 주문 옵션 정보 필요한 경우 hasOrderedOption=true 로 설정하여 요청하시기 바랍니다.\n\n페이지 사이즈는 최\
        대 100건까지 가능합니다.\n\n ### OAUTH2 참고사항\n* [Oauth2 API](https://docs.shopby.co.kr/?url.primaryName=auth/#/OAUTH2/post-oauth2-token)\
        \ 를 사용하여 토큰을 발급받은 경우,\n* 기존 accessToken 대신 Shop-By-Authorization 로 액세스 토큰을\
        \ 전달해야합니다.\n* ex) Shop-By-Authorization : Bearer test-access-token\n"
      operationId: get-product-reviews
      parameters:
      - name: productNo
        in: path
        description: 상품 번호
        required: true
        schema:
          type: number
      - name: hasAttachmentFile
        in: query
        description: "첨부 파일 여부 (true: 첨부 파일 있는 리뷰만, false: 첨부 파일 없는 리뷰만, 미지정: 전체)"
        required: false
        schema:
          type: boolean
      - name: order.by
        in: query
        description: "정렬 기준 (추천순: RECOMMEND, 등록일순: REGISTER_YMDT, 평점순: RATING, 베스트\
          리뷰순: BEST_REVIEW)"
        required: false
        schema:
          type: string
      - name: order.direction
        in: query
        description: "정렬 순서 (default: DESC) (오름차순: ASC, 내림차순: DESC)"
        required: false
        schema:
          type: string
      - name: bestReviewYn
        in: query
        description: "베스트 상품평 여부 ( 우수상품평:Y , 일반상품평:N , 전체: NULL )"
        required: false
        schema:
          type: string
      - name: pageNumber
        in: query
        description: "페이지 번호 (default : 1)"
        required: false
        schema:
          type: number
      - name: pageSize
        in: query
        description: "한 페이지당 노출 수, 페이지 사이즈는 최대 100건까지 가능합니다. (default: 10)"
        required: false
        schema:
          type: number
      - name: hasTotalCount
        in: query
        description: "목록 카운트 포함 여부(default: false)"
        required: false
        schema:
          type: boolean
      - name: ratingRange.from
        in: query
        description: "리뷰평점 시작범위(default: null)"
        required: false
        schema:
          type: number
      - name: ratingRange.to
        in: query
        description: "리뷰평점 끝범위(default: null)"
        required: false
        schema:
          type: number
      - name: tagValueNos
        in: query
        description: 태그값번호
        required: false
        schema:
          type: string
      - name: hasProductInfo
        in: query
        description: "상품 정보 포함 여부(default: true)"
        required: false
        schema:
          type: boolean
      - name: hasOrderedOption
        in: query
        description: "주문 옵션 정보 포함 여부(default: false)"
        required: false
        schema:
          type: boolean
      - name: Version
        in: header
        description: API 버전
        required: true
        schema:
          type: string
        example: "2.0"
      - name: accessToken
        in: header
        description: 회원 엑세스 토큰(OAuth2 스펙)
        required: false
        schema:
          type: string
        example: AccessToken
      - name: clientId
