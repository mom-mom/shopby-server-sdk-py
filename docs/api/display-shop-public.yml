      description: "## 부가설명 및 특이사항\n            \n기획전번호 리스트로 기획전을 조회하는 API 입니다.\n\n\
        현재 진행중인 기획전만 조회되고, 그 이외(진행대기, 종료)에는 조회되지 않습니다.\n\n플랫폼별, 멤버그룹별, 멤버등급별에 따라 접\
        근 불가능한 기획전은 조회되지 않습니다.\n\nproducts: 상품 목록 응답\n\n* 응답에서 기획전 내 상품목록은 전시순서가 가\
        장 앞선 1개의 섹션 상품 목록이 조회되며, 상품 전시 순서에 의해 정렬됩니다.\n\n* 상품 목록은 countPerEvent 변수에\
        \ 의해 응답 상품 개수가 제한되며,\n\n* 그 중 품절상품, 판매종료된 상품은 soldout, saleStatus 파라미터에 의해\
        \ 다시 제외될 수 있습니다.\n\n* 예를 들어, 15개의 상품 목록은 먼저 `countPerEvent = 10`에 의해 10개 상\
        품으로 제한되고, 품절상품 및 판매 종료 상품이 제외되어 실제 결과가 10개 미만으로 표시될 수 있습니다.\n\n ### OAUTH2\
        \ 참고사항\n* [Oauth2 API](https://docs.shopby.co.kr/?url.primaryName=auth/#/OAUTH2/post-oauth2-token)\
        \ 를 사용하여 토큰을 발급받은 경우,\n* 기존 accessToken 대신 Shop-By-Authorization 로 액세스 토큰을\
        \ 전달해야합니다.\n* ex) Shop-By-Authorization : Bearer test-access-token\n"
      operationId: search-event-by-event-nos
      parameters:
      - name: eventNos
        in: query
        description: "조회 대상 기획전번호 목록(\",\" 구분, 최소 1, 최대 10)"
        required: true
        schema:
          type: number
      - name: countPerEvent
        in: query
        description: "기획전별 조회 대상 상품 개수, 최소 1, 최대 10(DEFAULT)"
        required: false
        schema:
          type: string
      - name: soldout
        in: query
        description: "품절 상품 포함 여부(DEFAULT: false)"
        required: false
        schema:
          type: boolean
      - name: saleStatus
        in: query
        description: "판매 상태 (판매대기, 판매중 상품만 조회: READY_ONSALE, 판매중인 상품만 조회: ONSALE,\
          \ 예약판매중인 상품과 판매중인 상품만 조회: RESERVATION_AND_ONSALE)"
        required: false
        schema:
          type: string
      - name: Version
        in: header
        description: API 버전
        required: true
        schema:
          type: string
        example: "1.0"
      - name: accessToken
        in: header
        description: 회원 엑세스 토큰(OAuth2 스펙)
        required: false
        schema:
          type: string
        example: AccessToken
      - name: clientId
        in: header
        description: 쇼핑몰 클라이언트 아이디
        required: true
        schema:
          type: string
        example: test-client-id
      - name: platform
        in: header
        description: "PC - PC 웹 브라우저에서 접근 시, MOBILE_WEB - 모바일 웹 브라우저에서 접근 시, AOS -\
          \ Android 앱에서 접근 시, IOS - iOS 앱에서 접근 시"
