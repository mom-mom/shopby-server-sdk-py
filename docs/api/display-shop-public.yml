        required: true
        schema:
          type: string
        example: "1.0"
      - name: clientId
        in: header
        description: 쇼핑몰 클라이언트 아이디
        required: true
        schema:
          type: string
        example: test-client-id
      - name: platform
        in: header
        description: "PC - PC 웹 브라우저에서 접근 시, MOBILE_WEB - 모바일 웹 브라우저에서 접근 시, AOS -\
          \ Android 앱에서 접근 시, IOS - iOS 앱에서 접근 시"
        required: true
        schema:
          type: string
        example: PC
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/stickers-1965548140'
              examples:
                get-stickers:
                  value: "[{\"stickerNo\":100,\"stickerName\":\"MD 추천\",\"stickerType\"\
                    :\"IMAGE\",\"useYn\":\"Y\",\"productCount\":4,\"content\":\"MD\
                    \ 추천용\",\"displayOrder\":1}]"
