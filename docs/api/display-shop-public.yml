        \ 조회하는 API입니다.\n\nsize: 상품을 조회하는 최대 페이지 사이즈는 30입니다.\n\n현재 진행중인 기획전만 조회되고,\
        \ 그 이외(진행대기, 종료)에는 조회되지 않습니다.\n\n플랫폼별, 멤버그룹별, 멤버등급별에 따라 접근 불가능한 상품진열 상품은 조\
        회되지 않습니다.\n\n에러코드: EVEC0001(기획전이 존재하지 않는 경우), EVEC0002(현재 진행중인 기획전이 아닌 경우\
        ), EVEC0003(접근할 수 없는 기획전인 경우)\n\n ### OAUTH2 참고사항\n* [Oauth2 API](https://docs.shopby.co.kr/?url.primaryName=auth/#/OAUTH2/post-oauth2-token)\
        \ 를 사용하여 토큰을 발급받은 경우,\n* 기존 accessToken 대신 Shop-By-Authorization 로 액세스 토큰을\
        \ 전달해야합니다.\n* ex) Shop-By-Authorization : Bearer test-access-token\n"
      operationId: get-event-section-products
      parameters:
      - name: eventNo
        in: path
        description: 기획전 번호
        required: true
        schema:
          type: number
      - name: sectionNo
        in: path
        description: 상품진열 번호
        required: true
        schema:
          type: number
      - name: order
        in: query
        description: "정렬조건(SALE: 판매시작일 오름차순 - default, ADMIN_SETTING: 관리자 설정 순서, BEST_SELLER:\
          \ 판매순, BEST_REVIEW: 리뷰순, PRICE: 가격순)"
        required: false
        schema:
          type: string
      - name: direction
        in: query
        description: "정렬 순서 ( DESC: 내림차순 , ASC: 오름차순 )"
        required: false
        schema:
          type: string
      - name: soldout
        in: query
        description: "품절 상품 포함 여부(default: false)"
        required: false
        schema:
          type: boolean
      - name: saleStatus
        in: query
        description: "판매 상태 (판매대기, 판매중 상품만 조회: READY_ONSALE, 판매중인 상품만 조회: ONSALE,\
          \ 예약판매중인 상품과 판매중인 상품만 조회: RESERVATION_AND_ONSALE) - 만약 판매상태를 보내지 않으면 판매금\
          지를 제외한 전체가 조회됩니다."
        required: false
        schema:
          type: string
      - name: includeStopProduct
        in: query
        description: "판매중지 상품 포함 여부(default: false)"
        required: false
        schema:
          type: boolean
      - name: includeUrlDirectDisplay
        in: query
        description: "URL로만 접근 상품 포함 여부(default: true)"
        required: false
        schema:
          type: boolean
      - name: preview
        in: query
        description: "기획전 미리보기 여부(default: false)"
        required: false
        schema:
          type: boolean
      - name: pageNumber
        in: query
        description: 페이지 번호(default 1)
        required: false
        schema:
          type: number
      - name: pageSize
        in: query
        description: 한 페이지당 상품 노출 수(default 10)
        required: false
        schema:
          type: number
      - name: Version
        in: header
        description: API 버전
        required: true
        schema:
          type: string
        example: "1.0"
      - name: accessToken
        in: header
        description: 회원 엑세스 토큰(OAuth2 스펙)
        required: false
        schema:
          type: string
        example: AccessToken
      - name: clientId
