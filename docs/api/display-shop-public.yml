                    ,\"endYmdt\":\"2030-12-31T12:59:59\",\"pcImageUrl\":\"http://shop.com/eventpage\"\
                    ,\"mobileimageUrl\":\"http://shop.com/eventpage\",\"promotionText\"\
                    :\"이벤트 홍보 문구\",\"tag\":\"이벤트\",\"eventYn\":\"Y\",\"progressStatus\"\
