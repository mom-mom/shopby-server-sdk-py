          description: "200"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/products-productNo-product-reviews535229251'
              examples:
                get-product-reviews:
                  value: "{\"totalCount\":0,\"rate\":0,\"items\":[{\"reviewNo\":1,\"\
                    rate\":0,\"productNo\":1,\"productName\":\"상품명\",\"productNameEn\"\
                    :\"영문상품명\",\"providerType\":\"FACEBOOK\",\"memberId\":\"parkjs\"\
