    post:
      tags:
      - Inquiry
      summary: 1:1 문의 등록하기
      description: "## 부가설명 및 특이사항\n1:1 문의를 등록하는 API 입니다.\n\n샵바이엔터프라이즈 쇼핑몰에서만 비회원\
        \ 1:1문의가 가능합니다.\n비회원 등록 시에는 email을 필수로 입력해야 합니다.\n\n## 화면 예시\n<a target='_blank'\
        \ href='http://image.toast.com/aaaaahb/api-description/member/inquiry/post_inquiries.png'><img\
        \ src='http://image.toast.com/aaaaahb/api-description/member/inquiry/post_inquiries.png?autox150'></a>\n\
        \n<hr>\n\n## 참고: 이미지 파일(첨부파일) 업로드 방법 안내\n이미지파일 업로드 API를 호출하여 이미지 등록 이후 1:1문\
        의 등록 시 업로드 된 파일명 항목에 등록한 image url 을 입력하여 호출해 주시면 됩니다.\n\n참고로 이미지 업로드 시 이미\
        지 업로드되는 도메인인 base url은 shopby-images.cdn-nhncommerce.com입니다.\n\n이미지 업로드는 관\
        련해서는 아래 내용으로 참고 부탁드립니다.\n\n※해당 API는 별도 API문서가 없습니다.(하이퍼링크 연결 안되는것이 맞음)\n\n\
        \nPOST http://shop-api.e-ncp.com/files/images (리얼)\n\n### header 정보\n - Version\
        \ : 1.0\n - clientId : {몰의 clientId}\n - platform : (PC, MOBILE_WEB, IOS,\
        \ AOS 중 하나로 해당 API 를 호출하는 플랫폼의 유형)\n - Content-Type : multipart/form-data\n\
        \ \n### Body :\n - file:'image data'\n\n### Request\n\nimageUrl : 이미지 URL\n\
        \noriginName : 원본 파일명\n\n파일명의 경우 2~255자 범위내에 있어야합니다.\n\n파일 용량의 경우, 12MB 이하\
        의 이미지 파일만 업로드 가능합니다.\n\n지원하는 확장자는 아래와 같습니다.\n\nbmp, tif, tiff, miff, gif,\
        \ jpe, jpeg, jpg, jps, pjpeg, jng, mng, png\n"
      operationId: add-inquiry
      parameters:
      - name: Version
        in: header
        description: API 버전^|1.0
        required: true
        schema:
          type: string
        example: "1.0"
      - name: clientId
        in: header
        description: 쇼핑몰 클라이언트 아이디^|test-client-id
        required: true
        schema:
          type: string
        example: test-client-id
      - name: platform
        in: header
        description: "클라이언트 플랫폼 (PC, MOBILE_WEB, IOS, AOS)^|PC"
        required: true
        schema:
          type: string
        example: PC
      - name: accessToken
        in: header
        description: 회원 엑세스 토큰^|accessToken
        required: false
        schema:
          type: string
        example: test-access-token
      - name: language
        in: header
        description: "언어 (기본값: ko)^|ko"
        required: false
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/inquiries-402704865"
            examples:
              add-inquiry:
                value: |-
                  {
                    "inquiryTypeNo" : 0,
                    "inquiryTitle" : "test Title",
                    "inquiryContent" : "test Content",
                    "originalFileName" : [ "test.jpg" ],
                    "uploadedFileName" : [ "테스트.jpg" ],
                    "productNo" : 12345,
                    "orderNo" : "12345",
                    "orderOptionNo" : 123499,
                    "answerSmsSendYn" : false,
                    "answerEmailSendYn" : false,
                    "email" : "test@test.com",
                    "captcha" : "string",
                    "mobileNo" : "01012341234"
                  }
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/inquiries-895422087"
              examples:
                add-inquiry:
                  value: |-
                    {
                      "inquiryNo" : 12345
                    }
