openapi: 3.0.1
info:
  title: manage-shop
  description: ' 쇼핑몰 운영(manage) 관련 shop API입니다.'
  version: "1.0"
servers:
- url: https://shop-api.e-ncp.com
tags:
- name: Address
  description: 주소
- name: Board
  description: 게시판
- name: Holiday
  description: 공휴일
- name: Inquiry
  description: 1:1 문의
- name: Page
  description: 외부스크립트
- name: Accumulation
  description: 적립금
- name: Instagram
  description: 인스타그램
- name: Terms
  description: 약관
paths:
  /addresses/search:
    get:
      tags:
      - Address
      summary: 주소 조회하기
      description: |2-

        ## 부가설명 및 특이사항
        검색 키워드로 주소정보를 검색하는 API 입니다.

        ##Request 요청
        | name      | type      | required  | default value | description      |
        |-----------|-----------|-----------|---------------|------------------|
        | keyword   | String    | Y         |               | 검색 키워드         |
        | pageNumber| Int       | N         | 1             | 페이지 번호         |
        | pageSize  | Int       | N         | 10(MAX = 1000)| 한 페이지당 노출 수   |
        ## pageSize가 최대 사이즈(1000)를 초과할 경우 최대 사이즈 만큼 조회됩니다.
      operationId: search-addresses
      parameters:
      - name: pageNumber
        in: query
        description: 페이지 번호^|1
        required: false
        schema:
          type: number
      - name: pageSize
        in: query
        description: 페이지 사이즈^|10
        required: false
        schema:
          type: number
      - name: keyword
        in: query
        description: "검색 키워드^|디지털로26길 43, 대륭포스트타워 8차 R동 6~7층"
        required: true
        schema:
          type: string
      - name: Version
        in: header
        description: API 버전^|1.0
        required: true
        schema:
          type: string
        example: "1.0"
      - name: clientId
        in: header
        description: 쇼핑몰 클라이언트 아이디^|test-client-id
        required: true
        schema:
          type: string
        example: test-client-id
      - name: platform
        in: header
        description: "클라이언트 플랫폼 (PC, MOBILE_WEB, IOS, AOS)^|PC"
        required: true
        schema:
          type: string
        example: PC
      - name: language
        in: header
        description: "언어 (기본값: ko)^|ko"
        required: false
        schema:
          type: string
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/addresses-search511048687"
              examples:
                search-addresses:
                  value: |-
                    {
                      "totalCount" : 1,
                      "groupByStates" : [ ],
                      "items" : [ {
                        "address" : "서울특별시 구로구 디지털로26길 43, 대륭포스트타워 8차 R동 6~7층 (NHN KCP)",
                        "detailAddress" : "",
                        "roadAddress" : "서울특별시 구로구 디지털로26길 43, 대륭포스트타워 8차 R동 6~7층 (NHN KCP)",
                        "roadAddressExtra" : "",
                        "jibunAddress" : "서울특별시 구로구 구로동 222-22 NHN KCP",
                        "relatedJibun" : "",
                        "zipCode" : "08393",
                        "oldZipCode" : "",
                        "engAddress" : "72 Digital-ro 26-gil, Guro-gu, Seoul"
                      } ]
                    }
  /addresses/search/jp:
    get:
      tags:
      - Address
      summary: 일본 주소 검색
      description: " 일본 주소 검색\n \n ### 3.2 **응답 필드 설명**\n **필드** | **타입** | **설명**\
        \ | 예제 값 |\n --- | --- | --- | ---- |\n zipCode | String | 우편번호 (하이픈 제거) |\
        \ 1056322 |\n prefCode | String | 도도부현 코드 (2자리) | 13 |\n jisCode | String\
        \ | JIS 코드 | 130001 |\n address | String | 전체 주소 | 東京都港区虎ノ門虎ノ門ヒルズ森タワー２２階 |\n\
        \ addressEnglish | String | 전체 주소 (영문) | TORANOMON TORANOMONHIRUZUMORITAWA,\
        \ MINATO KU, TOKYO TO |\n addressList | Array | 입력된 우편번호에 해당하는 복수의 주소 리스트\
        \ | ['宮城県 伊具郡丸森町 赤堀', '宮城県 伊具郡丸森町 泉'] |\n state | String | 도도부현 이름 | 東京都 |\n\
        \ city | String | 시/구/읍/면 이름 | 港区 |\n streetAddress | String | 상세 주소 | 虎ノ門\
        虎ノ門ヒルズ森タワー２２階 |\n"
      operationId: search-jp-address
      parameters:
      - name: zipCode
        in: query
        description: 우편번호
        required: true
        schema:
          type: string
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/addresses-search-jp484412385"
              examples:
                search-jp-address:
                  value: |-
                    {
                      "zipCode" : "6068341",
                      "prefCode" : "26",
                      "jisCode" : "26103",
                      "address" : "京都府京都市左京区岡崎西天王町",
                      "addressEnglish" : "",
                      "addressList" : [ ],
                      "state" : "京都府",
                      "city" : "京都市左京区",
                      "streetAddress" : "岡崎西天王町"
                    }
  /boards/configurations:
